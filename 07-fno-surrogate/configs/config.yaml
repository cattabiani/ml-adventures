grid:
  nx: 32
  ny: 32
  lx: 1.0
  ly: 1.0
  nu: 0.3

data:
  num_train_samples: 400
  num_val_samples: 100
  kernel_size: 9
  sigma: 3.0
  train_data_path: "data/train_data.pt"
  val_data_path: "data/val_data.pt"

model:
  modes1: 12
  modes2: 12
  width: 32
  in_channels: 5 # [E, f_x, f_y, grid_x, grid_y]
  out_channels: 3 # [u_x, u_y, sigma_vm]

training:
  epochs: 50
  batch_size: 16
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler_step_size: 10
  scheduler_gamma: 0.5
  device: "cpu" # Set to cuda if available in training script
  model_save_path: "fno_elasticity.pt"
